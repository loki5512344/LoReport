name: Loreport
version: ${version}
main: dev.loki.lorep.LorepPlugin
api-version: '1.19'
author: loki5512344
description: Modern player report system with Discord integration and GUI
website: https://codeberg.org/loki5512344/Loreport

commands:
  report:
    description: Report a player or manage reports
    usage: /report <player> <reason> | /report gui | /report stats <player>
    permission: lorep.report
    aliases: [rep, reports]

permissions:
  lorep.report:
    description: Allows players to report other players
    default: true
  lorep.admin:
    description: Allows access to admin commands (gui, stats)
    default: op
  lorep.*:
    description: Gives access to all Loreport permissions
    default: false
    children:
      lorep.report: true
      lorep.admin: true
