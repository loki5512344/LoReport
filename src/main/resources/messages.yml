# LoReport messages
# You can edit these to change plugin messages without recompiling
# Color codes: &0-9, &a-f, &k-o, &r

# General
console-only: "&cThis command is for players only!"
no-permission: "&cYou don't have permission to use this command!"
usage: "&eUsage: /report <player> <reason> [screenshot_url] | /report gui | /report stats <player> | /report image <id> <url>"

# Reporting
report-sent: "&aReport sent successfully!"
already-reported: "&cYou have already reported this player!"
