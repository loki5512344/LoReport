# Discord webhook URL for report notifications
webhook-url: ""

# Database configuration
database:
  # Database type: "sqlite" or "postgresql"
  type: "sqlite"
  
  # SQLite settings
  sqlite:
    file: "reports.db"
  
  # PostgreSQL settings
  postgresql:
    host: "localhost"
    port: 5432
    database: "loreport"
    username: "loreport"
    password: "password"
    pool-size: 10

# GUI settings
gui:
  # Reports per page in GUI
  reports-per-page: 45
  # Auto-refresh interval in ticks (20 ticks = 1 second)
  auto-refresh: 100
  # Show player heads in GUI
  show-player-heads: true
  # GUI item definitions — customize materials, textures, and positions
  # Set custom-model-data to your resource pack model ID (-1 to disable)
  # Use slots to make an item span multiple slots (empty = default position)
  items:
    prev-page:
      material: ARROW
      custom-model-data: -1
      name: "&a← Previous page"
      lore: []
      slots: [45]
      glowing: false
    next-page:
      material: ARROW
      custom-model-data: -1
      name: "&aNext page →"
      lore: []
      slots: [53]
      glowing: false
    page-info:
      material: PAPER
      custom-model-data: -1
      name: "&ePage %page% of %total%"
      lore:
        - "&7Total reports: %total_reports%"
      slots: [49]
      glowing: false
    close:
      material: BARRIER
      custom-model-data: -1
      name: "&cClose"
      lore: []
      slots: [47]
      glowing: false
    report-entry:
      material: PLAYER_HEAD
      custom-model-data: -1
      name: "&c%target_name%"
      lore:
        - "&7"
        - "&eBy: &f%reporter_name%"
        - "&eReason: &f%reason%"
        - "&eTime: &f%time%"
        - "&eStatus: &f%status%"
        - "&7"
        - "&eReports: &c%report_count%"
      slots: []
      glowing: false
    status-pending:
      material: RED_STAINED_GLASS_PANE
      custom-model-data: -1
      name: "&cPending"
      lore: []
      slots: []
      glowing: false
    status-reviewing:
      material: YELLOW_STAINED_GLASS_PANE
      custom-model-data: -1
      name: "&eReviewing"
      lore: []
      slots: []
      glowing: true
    status-resolved:
      material: GREEN_STAINED_GLASS_PANE
      custom-model-data: -1
      name: "&aResolved"
      lore: []
      slots: []
      glowing: false
    status-dismissed:
      material: GRAY_STAINED_GLASS_PANE
      custom-model-data: -1
      name: "&7Dismissed"
      lore: []
      slots: []
      glowing: false
    teleport:
      material: ENDER_PEARL
      custom-model-data: -1
      name: "&bTeleport to player"
      lore: []
      slots: []
      glowing: false
    screenshot:
      material: MAP
      custom-model-data: -1
      name: "&aScreenshot"
      lore: []
      slots: []
      glowing: false

# Limits
limits:
  # Maximum reason length in characters
  max-reason-length: 100
  # Cooldown between reports (seconds)
  report-cooldown: 30
  # Max reports per player from the same reporter
  max-reports-per-player: 3

# Notifications
notifications:
  # Notify admins about new reports
  notify-admins: true
  # Admin notification sound
  admin-notification-sound: "BLOCK_NOTE_BLOCK_PLING"
  # Notify reporter when report is handled
  notify-reporter: true

# Messages (override defaults from messages.yml)
messages:
  report-sent: "&aReport sent successfully!"
  already-reported: "&cYou have already reported this player!"
  self-report: "&cYou cannot report yourself!"
  player-not-found: "&cPlayer not found!"
  no-permission: "&cYou don't have permission!"
  usage: "&eUsage: /report <player> <reason> [screenshot_url] | /report gui | /report stats <player> | /report image <id> <url>"
  no-reports: "&eThis player has no reports."
  stats-header: "&6=== Report stats: %player% ==="
  stats-count: "&eTotal reports: &f%count%"
  stats-last-online: "&eLast online: &f%time%"
  stats-report-entry: "&7- %reason% &8(%time% ago)"
  gui-title: "Reports - Page %page%"
  cooldown: "&cPlease wait %time% seconds before your next report!"
  reason-too-long: "&cReason too long! Max %max% characters."
  max-reports-reached: "&cYou've reached the max reports for this player!"
  admin-notification: "&6[LoReport] &eNew report from &f%reporter% &eon &f%reported%: &7%reason%"
  report-status-changed: "&aReport #%id% status changed to: %status%"
  report-image-added: "&aScreenshot added to report #%id%"
  report-image-usage: "&eUsage: /report <player> <reason> [screenshot_url]"
  report-image-url-usage: "&eUsage: /report image <id> <url>"
  status-pending: "&cPending"
  status-reviewing: "&eReviewing"
  status-resolved: "&aResolved"
  status-dismissed: "&7Dismissed"
